spring:
  application:
    name: modakmodak
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/modakmodak?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

mail:
  host: smtp.gmail.com
  port: 587
  username: ${MAIL_USERNAME}  # 👈 Render 환경변수에서 가져옴
  password: ${MAIL_PASSWORD}  # 👈 Render 환경변수에서 가져옴 (띄어쓰기 없이 16자리!)
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true
          required: true
          ssl:
            trust: smtp.gmail.com

springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /api-docs

google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID:your-client-id}
    client-secret: ${GOOGLE_CLIENT_SECRET:your-client-secret}

